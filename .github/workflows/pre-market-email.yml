name: Pre-Market Review Email

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 3:00 AM HST (UTC-10), weekdays
  workflow_dispatch:         # allow manual trigger

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run pre-market script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/market/pre_market.py
