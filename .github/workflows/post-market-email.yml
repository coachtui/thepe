name: Post-Market Review Email

on:
  schedule:
    - cron: '15 20 * * 1-5'  # 10:15 AM HST (UTC-10), weekdays
  workflow_dispatch:          # allow manual trigger

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run post-market script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/market/post_market.py
